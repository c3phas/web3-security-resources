<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Web3 security career map</title>
  <desc id="desc">A layered map from fundamentals through audit specialties and protocol operations.</desc>
  <rect width="960" height="520" fill="#f8fafc"/>
  <rect x="48" y="40" width="864" height="440" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="80" y="90" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="700" fill="#0f172a">Web3 Security Career Map</text>
  <text x="80" y="122" font-family="Inter,Arial,sans-serif" font-size="15" fill="#475569">Build fundamentals, specialize by execution environment, then learn protocol operations.</text>
  <g font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">
    <rect x="80" y="170" width="180" height="68" rx="10" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="112" y="211" fill="#075985">Fundamentals</text>
    <rect x="310" y="170" width="180" height="68" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="350" y="211" fill="#4c1d95">EVM Auditor</text>
    <rect x="540" y="170" width="180" height="68" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="571" y="211" fill="#14532d">Solana / Move</text>
    <rect x="80" y="292" width="180" height="68" rx="10" fill="#fef3c7" stroke="#d97706"/>
    <text x="130" y="333" fill="#78350f">ZK / Cairo</text>
    <rect x="310" y="292" width="180" height="68" rx="10" fill="#ffe4e6" stroke="#e11d48"/>
    <text x="348" y="333" fill="#881337">Full-Stack</text>
    <rect x="540" y="292" width="180" height="68" rx="10" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="574" y="333" fill="#134e4a">Protocol Ops</text>
    <rect x="770" y="230" width="100" height="68" rx="34" fill="#f1f5f9" stroke="#64748b"/>
    <text x="796" y="270" fill="#334155">Lead</text>
  </g>
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M260 204 H310"/>
    <path d="M490 204 H540"/>
    <path d="M170 238 V292"/>
    <path d="M400 238 V292"/>
    <path d="M630 238 V292"/>
    <path d="M720 204 C760 204 760 264 770 264"/>
    <path d="M720 326 C760 326 760 264 770 264"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
