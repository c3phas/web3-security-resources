name: Stale resource
description: Flag a resource that is outdated, abandoned, or misleading.
title: "Stale resource: "
labels: ["stale-resource"]
body:
  - type: input
    id: resource
    attributes:
      label: Resource
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is it stale?
      description: Include replacement links if you know better current material.
    validations:
      required: true
